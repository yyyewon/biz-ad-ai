services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: biz-ad-ai-frontend:latest
    container_name: biz-ad-ai-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
# 파일 수정 시 컨테이너에 실시간 반영하기 위해 볼륨 추가
    volumes:
      - ./frontend:/app
    environment:
      - API_BASE_URL=http://backend:8010
      - API_BROWSER_BASE_URL=${API_BROWSER_BASE_URL:-http://localhost:8010}
      - WATCHDOG_USE_POLLING=true # 도커 환경에서 스트림릿이 소스코드 변경을 감지하도록 보장하는 옵션
    depends_on:
      - backend
    env_file:
      - ./frontend/.env

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: biz-ad-ai-backend:latest
    container_name: biz-ad-ai-backend
    restart: unless-stopped
    ports:
      - "8010:8010"
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
      - ./backend/logs:/app/logs

volumes:
  backend_data: