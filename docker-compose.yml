services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: biz-ad-ai-frontend:latest
    container_name: biz-ad-ai-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8010
      - API_BROWSER_BASE_URL=${API_BROWSER_BASE_URL:-http://localhost:8010}
    depends_on:
      - backend
    env_file:
      - ./frontend/.env

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
      args:
        BACKEND_REQUIREMENTS: requirements.txt
    image: biz-ad-ai-backend:latest
    container_name: biz-ad-ai-backend
    restart: unless-stopped
    mem_limit: ${BACKEND_MEMORY_LIMIT:-12g}
    memswap_limit: ${BACKEND_MEMORY_SWAP_LIMIT:-16g}
    ports:
      - "8010:8010"
    env_file:
      - ./backend/.env
    environment:
      - HF_HOME=/app/.cache/huggingface
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - U2NET_HOME=/models/rembg
    volumes:
      - backend_data:/app/data
      - ./backend/logs:/app/logs
      - /opt/hf-cache:/app/.cache/huggingface
      - model_cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  backend_data:
  model_cache:
