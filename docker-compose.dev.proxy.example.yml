# Docker 개발용 Jupyter Proxy 예시 파일
#
# 사용 방법:
# 1. cp docker-compose.dev.proxy.example.yml docker-compose.dev.proxy.yml
# 2. 본인 계정/포트/container_name/root-path/API_BROWSER_BASE_URL 수정
# 3. docker-compose.dev.proxy.yml은 Git에 올리지 않는다.
#
# 포트 예시 (spai0908): backend 8013, frontend 8513
# (팀 포트表는 jupyterlab-dev-server-guide.md 참고)
#
# ── JSONL 로그 경로 (METRICS_LOG_HOST_PATH) ──
#
# [기본] sudo 불필요 — 본인 logs-dev (팀 합산 X, 본인 metrics 만)
#   ./backend/logs-dev:/app/logs
#
# [팀 공용] /opt/biz-ad-ai-team-logs — sudo 있는 팀원이 1회 생성 후 전원 사용
#   sudo mkdir -p /opt/biz-ad-ai-team-logs && sudo chmod 1777 /opt/biz-ad-ai-team-logs
#   프로젝트 루트 .env 에:
#     METRICS_LOG_HOST_PATH=/opt/biz-ad-ai-team-logs
#
# ── METRICS_* (대시보드 필터용, spai0908 예시) ──
#   METRICS_SOURCE_USER=spai0908
#   METRICS_BACKEND_PORT=8013
#   METRICS_FRONTEND_PORT=8513
#   METRICS_DEPLOY_ENV=dev
#
# ── Metrics UI (8555, 팀당 1개) ──
#   http://34.60.252.165:8000/user/spai0908/proxy/8555/
#   이미 떠 있으면 metrics 서비스 up 생략

services:
  backend:
    image: biz-ad-ai-backend-dev:latest
    container_name: biz-ad-ai-backend-dev-본인계정명

    ports: !override
      - "본인_BACKEND_포트:8010"

    env_file:
      - ./backend/.env

    environment:
      - HF_HOME=/app/.cache/huggingface
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - METRICS_SOURCE_USER=본인계정명
      - METRICS_BACKEND_PORT=본인_BACKEND_포트
      - METRICS_FRONTEND_PORT=본인_FRONTEND_포트
      - METRICS_DEPLOY_ENV=dev

    # 개발 환경에서는 production entrypoint를 쓰지 않고,
    # Jupyter proxy root-path를 적용하기 위해 uvicorn을 직접 실행한다.
    # 대형 모델 프로세스 중복을 막기 위해 reload는 사용하지 않는다.
    entrypoint: !override
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"
      - --root-path
      - /user/본인계정명/proxy/본인_BACKEND_포트

    volumes: !override
      - ./backend:/app
      # 기본: ./backend/logs-dev (sudo 불필요)
      # 팀 공용: .env 에 METRICS_LOG_HOST_PATH=/opt/biz-ad-ai-team-logs
      - ${METRICS_LOG_HOST_PATH:-./backend/logs-dev}:/app/logs
      - /opt/hf-cache:/app/.cache/huggingface

    restart: "no"

  frontend:
    image: biz-ad-ai-frontend-dev:latest
    container_name: biz-ad-ai-frontend-dev-본인계정명

    ports: !override
      - "본인_FRONTEND_포트:8501"

    env_file:
      - ./frontend/.env

    environment:
      - API_BASE_URL=http://backend:8010
      - API_BROWSER_BASE_URL=http://34.60.252.165:8000/user/본인계정명/proxy/본인_BACKEND_포트

    volumes: !override
      - ./frontend:/app

    depends_on:
      - backend

    restart: "no"

  metrics:
    image: biz-ad-ai-frontend-dev:latest
    container_name: biz-ad-ai-metrics-dev-shared

    ports: !override
      - "8555:8501"

    environment:
      - METRICS_LOG_DIR=/logs

    entrypoint: !override
      - streamlit
      - run
      - metrics_app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true

    volumes: !override
      - ./frontend:/app
      # backend 와 같은 경로 (팀 공용이면 .env METRICS_LOG_HOST_PATH 로 맞춤)
      - ${METRICS_LOG_HOST_PATH:-./backend/logs-dev}:/logs:ro

    restart: "no"
